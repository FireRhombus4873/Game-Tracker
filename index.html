<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Game Tracker</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
        <style>
            /* ── Reset & Variables ── */
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            :root {
                --bg:          #0a0c10;
                --surface:     #111520;
                --surface2:    #1a1f2e;
                --border:      #232a3d;
                --accent:      #00e5ff;
                --accent-dim:  #00a8bb;
                --accent-glow: rgba(0, 229, 255, 0.18);
                --danger:      #ff3860;
                --text:        #dce6f0;
                --muted:       #5a6a82;
                --radius:      6px;
                --transition:  0.2s ease;
                --font-head:   'Rajdhani', sans-serif;
                --font-mono:   'Share Tech Mono', monospace;
            }

            /* ── Base ── */
            html { scroll-behavior: smooth; }

            body {
                background-color: var(--bg);
                background-image:
                    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,229,255,0.07) 0%, transparent 70%),
                    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px),
                    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px);
                color: var(--text);
                font-family: var(--font-head);
                font-size: 16px;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            /* ── Nav ── */
            header {
                position: sticky;
                top: 0;
                z-index: 100;
                background: rgba(10, 12, 16, 0.85);
                backdrop-filter: blur(12px);
                border-bottom: 1px solid var(--border);
            }

            nav ul {
                list-style: none;
                display: flex;
                align-items: center;
                gap: 1.5rem;
                padding: 0 2rem;
                height: 58px;
            }

            nav ul li:first-child {
                margin-right: auto;
            }

            nav a {
                color: var(--accent);
                text-decoration: none;
                font-family: var(--font-mono);
                font-size: 0.85rem;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                opacity: 0.75;
                transition: opacity var(--transition);
            }

            nav a:hover { opacity: 1; }

            /* ── Buttons ── */
            button {
                cursor: pointer;
                font-family: var(--font-head);
                font-weight: 600;
                letter-spacing: 0.08em;
                border: none;
                border-radius: var(--radius);
                transition: all var(--transition);
            }

            #open-modal {
                background: var(--accent);
                color: #000;
                padding: 0.45rem 1.2rem;
                font-size: 0.9rem;
                text-transform: uppercase;
            }

            #open-modal:hover {
                background: #fff;
                box-shadow: 0 0 18px var(--accent-glow);
            }

            /* ── Main ── */
            main {
                flex: 1;
                max-width: 1400px;
                width: 100%;
                margin: 0 auto;
                padding: 2.5rem 2rem 4rem;
            }

            #home {
                font-family: var(--font-head);
                font-size: clamp(2rem, 5vw, 3.2rem);
                font-weight: 700;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                color: var(--text);
                margin-bottom: 0.25rem;
            }

            #home span {
                color: var(--accent);
            }

            .subtitle {
                font-family: var(--font-mono);
                font-size: 0.8rem;
                color: var(--muted);
                letter-spacing: 0.12em;
                margin-bottom: 2.5rem;
            }

            /* ── Filter Bar ── */
            .filter-bar {
                display: flex;
                gap: 0.5rem;
                margin-bottom: 2rem;
                flex-wrap: wrap;
            }

            .filter-btn {
                background: var(--surface);
                color: var(--muted);
                border: 1px solid var(--border);
                padding: 0.4rem 1rem;
                font-size: 0.85rem;
                text-transform: uppercase;
                border-radius: 99px;
            }

            .filter-btn:hover,
            .filter-btn.active {
                background: var(--surface2);
                color: var(--accent);
                border-color: var(--accent);
                box-shadow: 0 0 10px var(--accent-glow);
            }

            /* ── Game Grid ── */
            .game-container {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 1.25rem;
            }

            .game {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                display: flex;
                flex-direction: column;
                transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
                animation: fadeIn 0.35s ease both;
            }

            .game:hover {
                transform: translateY(-4px);
                border-color: var(--accent-dim);
                box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px var(--accent-dim);
            }

            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to   { opacity: 1; transform: translateY(0); }
            }

            .game-info {
                padding: 0.75rem;
                display: flex;
                flex-direction: column;
                gap: 0.3rem;
                flex: 1;
            }

            .game h2 {
                font-size: 0.95rem;
                font-weight: 700;
                line-height: 1.3;
                letter-spacing: 0.03em;
                color: var(--text);
            }

            .game p {
                font-family: var(--font-mono);
                font-size: 0.72rem;
                color: var(--muted);
            }

            .game p span {
                color: var(--text);
            }

            /* ── Capsule Wrap ── */
            .capsule-wrap {
                position: relative;
            }

            .capsule-wrap > img {
                width: 100%;
                aspect-ratio: 2 / 3;
                object-fit: cover;
                display: block;
                background: var(--surface2);
                border-radius: var(--radius) var(--radius) 0 0;
                overflow: hidden;
            }

            .platform-icon {
                position: absolute;
                bottom: 8px;
                left: 8px;
                width: 28px !important;
                height: 28px !important;
                background: transparent !important;
                object-fit: contain;
                filter: drop-shadow(0 0 3px rgba(255,255,255,0.8)) drop-shadow(0 1px 4px rgba(0,0,0,0.9));
                opacity: 0.9;
            }

            /* ── Status Badge ── */
            .status-badge {
                display: inline-block;
                padding: 0.15rem 0.55rem;
                border-radius: 99px;
                font-family: var(--font-mono);
                font-size: 0.65rem;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                margin-top: 0.25rem;
                width: fit-content;
            }

            .status-played    { background: rgba(0,229,255,0.12); color: var(--accent); border: 1px solid rgba(0,229,255,0.3); }
            .status-playing   { background: rgba(255,200,0,0.12);  color: #ffc800;       border: 1px solid rgba(255,200,0,0.3); }
            .status-backlog   { background: rgba(90,106,130,0.15); color: var(--muted);  border: 1px solid rgba(90,106,130,0.3); }

            /* ── Delete button on card ── */
            .game-actions {
                padding: 0 0.75rem 0.75rem;
            }

            .status-badge {
                cursor: pointer;
                position: relative; /* needed for popover positioning */
                user-select: none;
            }

            .status-badge:hover {
                filter: brightness(1.3);
            }

            /* ── Status Popover ── */
            .status-popover {
                position: absolute;
                background: var(--surface2);
                border: 1px solid var(--accent-dim);
                border-radius: var(--radius);
                box-shadow: 0 8px 24px rgba(0,0,0,0.5);
                padding: 0.35rem;
                display: flex;
                flex-direction: column;
                gap: 0.2rem;
                z-index: 300;
                min-width: 120px;
                animation: slideUp 0.15s ease;
            }

            .status-popover button {
                background: transparent;
                color: var(--text);
                font-family: var(--font-mono);
                font-size: 0.72rem;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                padding: 0.4rem 0.65rem;
                border-radius: calc(var(--radius) - 2px);
                text-align: left;
            }

            .status-popover button:hover {
                background: var(--accent-glow);
                color: var(--accent);
            }

            .btn-delete {
                background: transparent;
                color: var(--muted);
                font-size: 0.72rem;
                padding: 0.3rem 0.6rem;
                border: 1px solid var(--border);
                border-radius: var(--radius);
                width: 100%;
                text-transform: uppercase;
                letter-spacing: 0.06em;
            }

            .btn-delete:hover {
                background: rgba(255,56,96,0.1);
                color: var(--danger);
                border-color: var(--danger);
            }

            /* ── Empty State ── */
            .empty-state {
                grid-column: 1 / -1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 1rem;
                padding: 5rem 2rem;
                color: var(--muted);
                text-align: center;
            }

            .empty-state .icon {
                font-size: 3rem;
                opacity: 0.3;
            }

            .empty-state p {
                font-family: var(--font-mono);
                font-size: 0.85rem;
                letter-spacing: 0.08em;
            }

            /* ── Modal Overlay ── */
            .modal {
                display: none;
                position: fixed;
                z-index: 200;
                inset: 0;
                background: rgba(0,0,0,0.7);
                backdrop-filter: blur(4px);
                align-items: center;
                justify-content: center;
            }

            .modal.open {
                display: flex;
            }

            .modal-box {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 10px;
                width: min(480px, calc(100vw - 2rem));
                box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px var(--accent-dim);
                animation: slideUp 0.25s ease;
                overflow: hidden;
            }

            @keyframes slideUp {
                from { opacity: 0; transform: translateY(20px); }
                to   { opacity: 1; transform: translateY(0); }
            }

            .modal-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 1.1rem 1.5rem;
                border-bottom: 1px solid var(--border);
            }

            .modal-header h2 {
                font-size: 1.1rem;
                font-weight: 700;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                color: var(--accent);
            }

            #close-modal {
                background: transparent;
                color: var(--muted);
                font-size: 1.4rem;
                line-height: 1;
                padding: 0.1rem 0.3rem;
                border-radius: var(--radius);
            }

            #close-modal:hover {
                color: var(--text);
                background: var(--surface2);
            }

            /* ── Form ── */
            #add-game-form {
                padding: 1.5rem;
                display: flex;
                flex-direction: column;
                gap: 1rem;
            }

            .form-group {
                display: flex;
                flex-direction: column;
                gap: 0.4rem;
            }

            .form-group label {
                font-family: var(--font-mono);
                font-size: 0.72rem;
                color: var(--muted);
                letter-spacing: 0.12em;
                text-transform: uppercase;
            }

            #add-game-form input,
            #add-game-form select {
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                color: var(--text);
                font-family: var(--font-head);
                font-size: 0.95rem;
                padding: 0.6rem 0.85rem;
                outline: none;
                transition: border-color var(--transition), box-shadow var(--transition);
                width: 100%;
            }

            #add-game-form input::placeholder { color: var(--muted); }

            #add-game-form input:focus,
            #add-game-form select:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px var(--accent-glow);
            }

            #add-game-form select option {
                background: var(--surface2);
            }

            #add-game-form button[type="submit"] {
                background: var(--accent);
                color: #000;
                padding: 0.7rem;
                font-size: 0.95rem;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                margin-top: 0.25rem;
            }

            #add-game-form button[type="submit"]:hover {
                background: #fff;
                box-shadow: 0 0 20px var(--accent-glow);
            }

            /* ── Footer ── */
            footer {
                border-top: 1px solid var(--border);
                padding: 1rem 2rem;
                font-family: var(--font-mono);
                font-size: 0.72rem;
                color: var(--muted);
                text-align: center;
                letter-spacing: 0.1em;
            }

            /* ── Responsive ── */
            @media (max-width: 600px) {
                nav ul { padding: 0 1rem; }
                main { padding: 1.5rem 1rem 3rem; }
                .game-container { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            }
        </style>
        <script>
            const URL_BASE = 'https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/%gameID%/library_600x900.jpg';

            function addGame(game) {
                localStorage.setItem('game_' + game.Id, JSON.stringify(game));
            }

            function createGame(id, name, platform, status) {
                return {
                    Id: id,
                    Name: name,
                    Platform: platform,
                    CapsuleURL: URL_BASE.replace('%gameID%', id),
                    Status: status,
                    DateAdded: new Date().toISOString()
                };
            }

            function deleteGame(id) {
                localStorage.removeItem('game_' + id);
                displayGames();
            }

            function getGames() {
                const games = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (!key.startsWith('game_')) continue;
                    try { games.push(JSON.parse(localStorage.getItem(key))); } catch(e) {}
                }
                return games.sort((a, b) => a.Name.localeCompare(b.Name));
            }
 
            function getPlatformIcon(platform) {
                const icons = { 'Steam': 'steam.svg', 'Epic': 'epic.svg', 'Pirated': 'pirate.svg' };
                return icons[platform] || null;
            }

            function statusClass(status) {
                if (status === 'Played')   return 'status-played';
                if (status === 'Playing')  return 'status-playing';
                return 'status-backlog';
            }

            let activeFilter = 'All';

            function displayGames() {
                const games = getGames().filter(g =>
                    activeFilter === 'All' || g.Status === activeFilter
                );
                const gameContainer = document.querySelector('.game-container');
                gameContainer.innerHTML = '';

                if (games.length === 0) {
                    gameContainer.innerHTML = `
                        <div class="empty-state">
                            <p>No games here yet.<br>Hit "Add Game" to get started.</p>
                        </div>`;
                    return;
                }

                games.forEach((game, i) => {
                    const gameElement = document.createElement('div');
                    gameElement.classList.add('game');
                    gameElement.style.animationDelay = `${i * 0.04}s`;
                    
                    const icon = getPlatformIcon(game.Platform);
                    const iconHTML = icon ? `<img class="platform-icon" src="${icon}" alt="${game.Platform}">` : '';

                    gameElement.innerHTML = `
                        <div class="capsule-wrap">
                            <img src="${game.CapsuleURL}" alt="${game.Name}" onerror="this.style.background='#1a1f2e';this.removeAttribute('src')">
                            ${iconHTML}
                        </div>
                        <div class="game-info">
                            <h2>${game.Name}</h2>
                            <!-- <p>Platform: <span>${game.Platform}</span></p> -->
                            <!-- <p>Added: <span>${new Date(game.DateAdded).toLocaleDateString()}</span></p> -->
                            <span class="status-badge ${statusClass(game.Status)}" onclick="event.stopPropagation(); openStatusPopover(this, '${game.Id}')">${game.Status}</span>
                        </div>
                        <div class="game-actions">
                            <button class="btn-delete" onclick="deleteGame('${game.Id}')">Remove</button>
                        </div>
                    `;
                    gameContainer.appendChild(gameElement);
                });
            }

            function openStatusPopover(badge, gameId) {
                // Close any existing popover first
                closeStatusPopover();

                const popover = document.createElement('div');
                popover.className = 'status-popover';
                popover.id = 'status-popover';

                const statuses = ['Playing', 'Played', 'Backlog'];
                statuses.forEach(status => {
                    const btn = document.createElement('button');
                    btn.textContent = status;
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        updateGameStatus(gameId, status);
                        closeStatusPopover();
                    };
                    popover.appendChild(btn);
                });

                badge.appendChild(popover);

                // Close when clicking outside
                setTimeout(() => {
                    document.addEventListener('click', closeStatusPopover, { once: true });
                }, 0);
            }

            function closeStatusPopover() {
                const existing = document.getElementById('status-popover');
                if (existing) existing.remove();
            }

            function updateGameStatus(gameId, newStatus) {
                const key = 'game_' + gameId;
                const game = JSON.parse(localStorage.getItem(key));
                if (!game) return;
                game.Status = newStatus;
                localStorage.setItem(key, JSON.stringify(game));
                displayGames();
            }

            function exportGames() {
                const games = getGames();
                const blob = new Blob([JSON.stringify(games, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'games-backup.json';
                a.click();
            }

            function importGames(event) {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const games = JSON.parse(e.target.result);
                    games.forEach(game => addGame(game));
                    displayGames();
                    alert(`${games.length} games imported successfully!`);
                };
                reader.readAsText(file);
            }
        </script>
    </head>
    <body>
        <header>
            <nav>
                <ul>
                    <li><a href="#home">&#9632; GAME TRACKER</a></li>
                    <li><button id="open-modal">+ Add Game</button></li>
                </ul>
            </nav>
        </header>

        <main>
            <div id="add-game-modal" class="modal">
                <div class="modal-box">
                    <div class="modal-header">
                        <h2>Add Game</h2>
                        <button id="close-modal">&times;</button>
                    </div>
                    <form id="add-game-form">
                        <div class="form-group">
                            <label for="game-id">Steam App ID <small style="opacity:0.5">(for cover art)</small></label>
                            <input type="text" id="game-id" placeholder="e.g. 292030">
                        </div>
                        <div class="form-group">
                            <label for="game-name">Game Name</label>
                            <input type="text" id="game-name" placeholder="e.g. The Witcher 3" required>
                        </div>
                        <div class="form-group">
                            <label for="game-platform">Platform</label>
                            <select id="game-platform-select">
                                <option value="" disabled selected>Select a platform</option>
                                <option value="Steam">Steam</option>
                                <option value="Epic">Epic</option>
                                <option value="Pirated">Pirated</option>
                                <option value="__custom__">Other (specify...)</option>
                            </select>
                            <input type="text" id="game-platform-custom" placeholder="Enter platform name..."
                                style="display:none; margin-top: 0.5rem;">
                        </div>
                        <script>
                            document.getElementById('game-platform-select').addEventListener('change', function() {
                                const customInput = document.getElementById('game-platform-custom');
                                customInput.style.display = this.value === '__custom__' ? 'block' : 'none';
                                if (this.value !== '__custom__') customInput.value = '';
                            });
                        </script>
                        <div class="form-group">
                            <label for="game-status">Status</label>
                            <select id="game-status" required>
                                <option value="" disabled selected>Select a status</option>
                                <option value="Playing">Playing</option>
                                <option value="Played">Played</option>
                                <option value="Backlog">Backlog</option>
                            </select>
                        </div>
                        <button type="submit">Add to Library</button>
                    </form>
                </div>
            </div>

            <script>
                const modal  = document.getElementById("add-game-modal");
                const btn    = document.getElementById("open-modal");
                const close  = document.getElementById("close-modal");
                const form   = document.getElementById("add-game-form");

                btn.onclick   = () => modal.classList.add('open');
                close.onclick = () => modal.classList.remove('open');
                modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('open'); };

                form.onsubmit = function(e) {
                    e.preventDefault();
                    const id       = document.getElementById('game-id').value.trim() || Date.now().toString();
                    const name     = document.getElementById('game-name').value.trim();

                    const platformSelect = document.getElementById('game-platform-select');
                    const platform = platformSelect.value === '__custom__'
                        ? document.getElementById('game-platform-custom').value.trim()
                        : platformSelect.value;
                    if (!platform) return; // guard against empty custom input

                    const status   = document.getElementById('game-status').value;
                    if (!name || !platform || !status) return;
                    addGame(createGame(id, name, platform, status));
                    form.reset();
                    modal.classList.remove('open');
                    displayGames();
                };
            </script>

            <h1 id="home">Game <span style="color:var(--accent)">Tracker</span></h1>
            <p class="subtitle">// YOUR PERSONAL LIBRARY</p>

            <div class="filter-bar">
                <button class="filter-btn active" data-filter="All">All</button>
                <button class="filter-btn" data-filter="Playing">Playing</button>
                <button class="filter-btn" data-filter="Played">Played</button>
                <button class="filter-btn" data-filter="Backlog">Backlog</button>
            </div>

            <div class="game-container"></div>
        </main>

        <footer>
            GAME TRACKER &mdash; YOUR LIBRARY, YOUR RULES
            <br>
            <div style="padding: 1rem 0; display:flex; gap:1rem; justify-content:center;">
                <button onclick="exportGames()" style="background: transparent; color: var(--muted); font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.1em; font-weight: normal;">EXPORT</button>
                <label style="cursor:pointer;">
                    IMPORT
                    <input type="file" accept=".json" onchange="importGames(event)" style="display:none;">
                </label>
            </div>
        </footer>
    </body>
</html>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        displayGames();

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeFilter = btn.dataset.filter;
                displayGames();
            });
        });
    });
</script>
